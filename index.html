  home:pageHome, new:pageNew, whatson:pageWhatsOn, involved:pageInvolved, services:pageServices,

/* ---------- render + events ---------- */
function render(){
  var pageFn = PAGES[state.page] || pageHome;
  var html = ''
    + '<div style="min-height:100vh;display:flex;flex-direction:column;">'
    +   renderHeader()
    +   renderMobileMenu()
    +   '<main style="flex:1;">'+pageFn()+'</main>'
    +   renderFooter()
    +   renderMobileBar()
    + '</div>';
  document.getElementById('app').innerHTML = html;
}

function go(page){ state.page = page; state.menuOpen = false; render(); try{ window.scrollTo(0,0); }catch(e){} }

document.addEventListener('click', function(e){
  var el = e.target.closest('[data-go],[data-act],[data-acc],[data-tab],[data-evfilter],[data-newsfilter]');
  if(!el) return;
  if(el.hasAttribute('data-go')){ e.preventDefault(); go(el.getAttribute('data-go')); return; }
  if(el.getAttribute('data-act')==='toggleMenu'){ e.preventDefault(); state.menuOpen=!state.menuOpen; render(); return; }
  if(el.hasAttribute('data-acc')){ e.preventDefault(); var id=el.getAttribute('data-acc'); state.acc[id]=!state.acc[id]; render(); return; }
  if(el.hasAttribute('data-tab')){ e.preventDefault(); state.serviceTab=el.getAttribute('data-tab'); render(); return; }
  if(el.hasAttribute('data-evfilter')){ e.preventDefault(); state.eventFilter=el.getAttribute('data-evfilter'); render(); return; }
  if(el.hasAttribute('data-newsfilter')){ e.preventDefault(); state.newsFilter=el.getAttribute('data-newsfilter'); render(); return; }
});

function showErr(which, msg){
  var span = document.querySelector('[data-err="'+which+'"]');
  if(span){ span.textContent = msg; span.style.display='block'; }
}

document.addEventListener('submit', function(e){
  var form = e.target.closest('form[data-form]');
  if(!form) return;
  e.preventDefault();
  var which = form.getAttribute('data-form');
  function val(name){ var f=form.querySelector('[name="'+name+'"]'); return f? f.value.trim() : ''; }
  if(which==='vol'){
    if(!val('name') || !validEmail(val('email'))){ showErr('vol','Please add your name and a valid email.'); return; }
    state.volDone=true; render();
  } else if(which==='sp'){
    if(!val('business') || !validEmail(val('email'))){ showErr('sp','Please add a business name and a valid email.'); return; }
    state.spDone=true; render();
  } else if(which==='ct'){
    if(!val('name') || !validEmail(val('email')) || !val('message')){ showErr('ct','Please add your name, a valid email and a message.'); return; }
    state.ctDone=true; render();
  }
});

render();
